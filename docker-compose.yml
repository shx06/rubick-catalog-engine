version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rubick_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_secure_pass
      POSTGRES_DB: rubick_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rubick_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rubick_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rubick_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:production_secure_pass@postgres:5432/rubick_db
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:8000
      - APPLICATION_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-service:
    build: ./ml-service
    container_name: rubick_ml_service
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./frontend
    container_name: rubick_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: